<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GK2 Switchgear</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/gk2/' +
      '?p=' + encodeURIComponent(l.pathname.replace('/gk2', '') + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
<body></body>
</html>
